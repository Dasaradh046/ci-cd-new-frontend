name: Tier-3 DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]

  pull_request:
    branches: [main]

  release:
    types: [published]

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10

jobs:

# ===========================================
# Stage 1: Code Quality
# ===========================================
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint


# ===========================================
# Stage 2: Type Checking
# ===========================================
  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check


# ===========================================
# Stage 3: Unit Tests
# ===========================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: type-check

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info


# ===========================================
# Stage 4: CodeQL Security Scan
# ===========================================
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3


# ===========================================
# Stage 5: SAST (Semgrep)
# ===========================================
  sast:
    name: Static Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/security-audit
            p/owasp-top-ten
            p/secrets


# ===========================================
# Stage 6: Secret Scanning
# ===========================================
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2


# ===========================================
# Stage 7: Dependency Vulnerability Scan
# ===========================================
  dependency-scan:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1


# ===========================================
# Stage 8: Dockerfile Lint
# ===========================================
  dockerfile-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile


# ===========================================
# Stage 9: Build Application
# ===========================================
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: [unit-tests, sast, dependency-scan]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next


# ===========================================
# Stage 10: Docker Build
# ===========================================
  container-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          push: true
          context: .
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ===========================================
# Stage 11: Container Security Scan
# ===========================================
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: container-build

    steps:
      - name: Scan image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1


# ===========================================
# Stage 12: SBOM Generation
# ===========================================
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: container-build

    steps:
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json


# ===========================================
# Stage 13: Container Signing (Cosign)
# ===========================================
  sign-container:
    runs-on: ubuntu-latest
    needs: container-build

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: sigstore/cosign-installer@v3

      - run: |
          cosign sign ghcr.io/${{ github.repository }}:${{ github.sha }} --yes


# ===========================================
# Stage 14: E2E Tests
# ===========================================
  e2e-tests:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: container-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install
      - run: pnpm exec playwright install --with-deps
      - run: pnpm test:e2e


# ===========================================
# Stage 15: Deploy Staging
# ===========================================
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [container-scan, e2e-tests]
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Deploy
        run: echo "Deploying to staging..."


# ===========================================
# Stage 16: Deploy Production
# ===========================================
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [container-scan, e2e-tests]
    if: github.event_name == 'release'

    steps:
      - name: Deploy
        run: echo "Deploying to production..."


# ===========================================
# Stage 17: Post Deploy Health Check
# ===========================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Check Service
        run: |
          echo "Running health check..."