name: Tier-3 DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]

  pull_request:
    branches: [main]

  release:
    types: [published]

permissions:
  actions: read
  contents: read
  security-events: write

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10

jobs:

# ===========================================
# Stage 1: Code Quality
# ===========================================
  lint:
    name: Code Quality - ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint


# ===========================================
# Stage 2: Type Checking
# ===========================================
  type-check:
    name: Static Type Check (TypeScript)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node & PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript Type Check
        run: pnpm type-check


# ===========================================
# Stage 3: Unit Tests
# ===========================================
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    needs: type-check

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Execute Unit Tests
        run: pnpm test

      - name: Upload Test Coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info


# ===========================================
# Stage 4: CodeQL Security Scan
# ===========================================
  codeql:
    name: CodeQL Security Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild Project
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3


# ===========================================
# Stage 5: SAST Scan
# ===========================================
  sast:
    name: Static Security Scan (Semgrep)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Semgrep Security Scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/security-audit
            p/owasp-top-ten
            p/secrets


# ===========================================
# Stage 6: Secret Detection
# ===========================================
  secret-scan:
    name: Secret Detection (Gitleaks)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Full Repository History
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Repository for Secrets
        uses: gitleaks/gitleaks-action@v2


# ===========================================
# Stage 7: Dependency Vulnerability Scan
# ===========================================
  dependency-scan:
    name: Dependency Vulnerability Scan (Trivy)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.34.2
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: 1


# ===========================================
# Stage 8: Dockerfile Lint
# ===========================================
  dockerfile-lint:
    name: Dockerfile Lint (Hadolint)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile


# ===========================================
# Stage 9: Build Application
# ===========================================
  build:
    name: Build Next.js Application
    runs-on: ubuntu-latest
    needs: [unit-tests, sast, dependency-scan]

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Application
        run: pnpm build

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next


# ===========================================
# Stage 10: Build & Push Container
# ===========================================
  container-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Authenticate to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Container Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ===========================================
# Stage 11: Container Security Scan
# ===========================================
  container-scan:
    name: Container Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: container-build

    steps:
      - name: Scan Container Image
        uses: aquasecurity/trivy-action@0.34.2
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1


# ===========================================
# Stage 12: Generate SBOM
# ===========================================
  sbom:
    name: Generate Software Bill of Materials
    runs-on: ubuntu-latest
    needs: container-build

    steps:
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json


# ===========================================
# Stage 13: Container Signing
# ===========================================
  sign-container:
    name: Sign Container Image (Cosign)
    runs-on: ubuntu-latest
    needs: container-build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Container Image
        run: |
          cosign sign ghcr.io/${{ github.repository }}:${{ github.sha }} --yes


# ===========================================
# Stage 14: End-to-End Tests
# ===========================================
  e2e-tests:
    name: Playwright End-to-End Tests
    runs-on: ubuntu-latest
    needs: container-build

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run End-to-End Tests
        run: pnpm test:e2e


# ===========================================
# Stage 15: Deploy Staging
# ===========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [container-scan, e2e-tests]
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Deploy Application to Staging
        run: echo "Deploying to staging..."


# ===========================================
# Stage 16: Deploy Production
# ===========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [container-scan, e2e-tests]
    if: github.event_name == 'release'

    steps:
      - name: Deploy Application to Production
        run: echo "Deploying to production..."


# ===========================================
# Stage 17: Post Deployment Health Check
# ===========================================
  health-check:
    name: Service Health Check
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Run Health Check
        run: echo "Running service health check..."