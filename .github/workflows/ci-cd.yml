name: Tier-3 DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main, develop]

  pull_request:
    branches: [main]

  release:
    types: [published]

env:
  NODE_VERSION: 24
  PNPM_VERSION: 10

# ==========================================================
# Stage 1: Code Quality
# ==========================================================
jobs:

  format-check:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint


# ==========================================================
# Stage 2: Type Checking
# ==========================================================
  type-check:
    name: TypeScript Check
    runs-on: ubuntu-latest
    needs: format-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm type-check


# ==========================================================
# Stage 3: Unit Tests
# ==========================================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: type-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false


# ==========================================================
# Stage 4: SAST (Semgrep)
# ==========================================================
  sast:
    name: Static Security Scan
    runs-on: ubuntu-latest
    needs: format-check

    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/security-audit
            p/secrets
            p/owasp-top-ten


# ==========================================================
# Stage 5: Secret Scanning
# ==========================================================
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    needs: format-check

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


# ==========================================================
# Stage 6: Dependency Vulnerability Scan (SCA)
# ==========================================================
  sca:
    name: Dependency Scan (Trivy)
    runs-on: ubuntu-latest
    needs: format-check

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1


# ==========================================================
# Stage 7: Build Application
# ==========================================================
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    needs: [unit-tests, sast, secret-scan, sca]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next


# ==========================================================
# Stage 8: Docker Build
# ==========================================================
  container-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


# ==========================================================
# Stage 9: Container Security Scan
# ==========================================================
  container-scan:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest
    needs: container-build

    steps:
      - name: Scan image
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1


# ==========================================================
# Stage 10: SBOM
# ==========================================================
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json


# ==========================================================
# Stage 11: E2E Tests
# ==========================================================
  e2e-tests:
    name: Playwright Tests
    runs-on: ubuntu-latest
    needs: container-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install

      - run: pnpm exec playwright install --with-deps

      - run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/


# ==========================================================
# Stage 12: Deploy Staging
# ==========================================================
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [container-scan, e2e-tests]
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Deploy
        run: echo "Deploying to staging..."


# ==========================================================
# Stage 13: Deploy Production
# ==========================================================
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [container-scan, e2e-tests]
    if: github.event_name == 'release'

    steps:
      - name: Deploy
        run: echo "Deploying to production..."


# ==========================================================
# Stage 14: Post Deployment Health Check
# ==========================================================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Check Service
        run: |
          echo "Running health check..."