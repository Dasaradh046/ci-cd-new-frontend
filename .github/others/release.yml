name: Release Pipeline

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: anchore/sbom-action@v0
        with:
          format: spdx-json
          output-file: sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json


  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: sbom

    steps:
      - name: Release completed
        run: echo "Release published successfully"