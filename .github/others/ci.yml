name: CI Pipeline

on:
  push:
    branches: [develop, main]

  pull_request:
    branches: [main]

env:
  NODE_VERSION: 25
  PNPM_VERSION: 10

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint


  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check


  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: typecheck

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - run: pnpm install --frozen-lockfile
      - run: pnpm test

      - uses: codecov/codecov-action@v4
        with:
          files: coverage/lcov.info