version: 2

updates:
  # ========================================
  # Node / PNPM Dependencies
  # ========================================
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"

    open-pull-requests-limit: 5

    labels:
      - "dependencies"
      - "security"

    commit-message:
      prefix: "chore(deps)"

    versioning-strategy: "increase"

    groups:
      production-dependencies:
        dependency-type: "production"

      development-dependencies:
        dependency-type: "development"

  # ========================================
  # GitHub Actions Updates
  # ========================================
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

    labels:
      - "ci"
      - "github-actions"

    commit-message:
      prefix: "chore(ci)"

  # ========================================
  # Docker Image Updates
  # ========================================
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"

    labels:
      - "docker"
      - "dependencies"

    commit-message:
      prefix: "chore(docker)"