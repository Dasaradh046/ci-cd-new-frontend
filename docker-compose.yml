# ==================================================
# DevSecOps Platform - Frontend Compose
# Next.js Production Deployment
# ==================================================

services:

  app:
    container_name: devsecops-frontend

    build:
      context: .
      dockerfile: Dockerfile

    image: devsecops-frontend:latest

    ports:
      - "3000:3000"

    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:- http://localhost:8000}

    restart: unless-stopped

    # -----------------------------
    # Container Health Check
    # -----------------------------
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # -----------------------------
    # Security Hardening
    # -----------------------------
    security_opt:
      - no-new-privileges:true

    # -----------------------------
    # Prevent log disk explosion
    # -----------------------------
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"